<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>参观计划 | Nobody Gallery</title>
    <link rel="stylesheet" href="../styles.css?v=20260517d" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-top">
        <a class="wordmark" href="../index.html" aria-label="Nobody Gallery home">
          <img src="../assets/logo.png" alt="Nobody Gallery 旺无名画廊" />
        </a>
        <div class="header-meta" aria-label="Gallery status">
          <span data-i18n="status">周二至周日开放 10:00 - 19:00</span>
          <a class="opening-link" href="./" data-i18n="openingTimes">开放时间</a>
        </div>
      </div>

      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links">
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="nav-links">
          <a href="../whats-on/now/" data-i18n="navWhatsOn">当前展览</a>
          <a href="../about/" data-i18n="navAbout">关于</a>
          <a href="./" data-i18n="navPlanVisit">参观计划</a>
          <a href="../ticket-info/" data-i18n="navTicketInfo">票务信息</a>
          <a href="../shop/" data-i18n="navShop">商店</a>
        </div>
        <div class="nav-tools">
          <div class="social-links" aria-label="Contact links">
            <a class="social-icon" href="mailto:nobodygallery@163.com" aria-label="Email Nobody Gallery">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 6h16v12H4z" stroke-width="1.8" />
                <path d="m4 7 8 6 8-6" stroke-width="1.8" />
              </svg>
            </a>
            <a class="social-icon" href="https://www.instagram.com/nobodygallery/" target="_blank" rel="noreferrer" aria-label="Nobody Gallery Instagram">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="5" y="5" width="14" height="14" rx="4" stroke-width="1.8" />
                <circle cx="12" cy="12" r="3.4" stroke-width="1.8" />
                <circle cx="16.5" cy="7.5" r="0.9" fill="currentColor" />
              </svg>
            </a>
          </div>
          <div class="lang-switch" aria-label="Language switcher">
            <button class="active" type="button" data-lang="zh">中</button>
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="de">DE</button>
          </div>
        </div>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-hero">
        <div>
          <p class="kicker" data-content="visit.kicker">参观</p>
          <h1 data-content="visit.title">参观计划</h1>
        </div>
        <p class="page-lede" data-content="visit.lede">
          参观信息集中在这里：开放时间、两个空间地址、预约说明和后续票务入口。
        </p>
      </section>

      <section class="page-section visit-layout">
        <nav class="side-nav" aria-label="Visit sections">
          <a class="active" href="#hours" data-content="visit.navHours">开放时间</a>
          <a href="#spaces" data-content="visit.navSpaces">空间地址</a>
          <a href="#booking" data-content="visit.navBooking">预约</a>
        </nav>

        <div class="visit-content">
          <section id="hours">
            <h2 data-content="visit.hoursTitle">开放时间</h2>
            <div class="visit-grid" data-info-list="visit.hours">
              <div>
                <p class="label">常规开放</p>
                <p>周二至周日，10:00 - 19:00</p>
              </div>
              <div>
                <p class="label">闭馆</p>
                <p>周一</p>
              </div>
            </div>
          </section>

          <section id="spaces" class="page-section">
            <h2 data-content="visit.spacesTitle">空间地址</h2>
            <div class="visit-grid" data-info-list="visit.spaces">
              <div>
                <p class="label">徐汇馆</p>
                <p>上海市徐汇区宜山路660号12幢3楼302室</p>
              </div>
              <div>
                <p class="label">金山馆</p>
                <p>上海市金山区亭卫公路8255号</p>
              </div>
            </div>
          </section>

          <section id="booking" class="page-section">
            <h2 data-content="visit.bookingTitle">预约</h2>
            <div data-content-html="visit.bookingHtml">
              <p>
                当前展览可免费参观。团体导览、媒体访问、放映活动与特别项目请提前通过邮箱联系。
              </p>
            </div>
            <a class="button" href="mailto:nobodygallery@163.com" data-content="visit.bookingButtonLabel" data-content-attr="visit.bookingButtonUrl:href">发送邮件</a>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>NOBODY GALLERY</p>
      <div class="social-links" aria-label="Contact links">
        <a class="social-icon" href="mailto:nobodygallery@163.com" aria-label="Email Nobody Gallery">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16v12H4z" stroke-width="1.8" />
            <path d="m4 7 8 6 8-6" stroke-width="1.8" />
          </svg>
        </a>
        <a class="social-icon" href="https://www.instagram.com/nobodygallery/" target="_blank" rel="noreferrer" aria-label="Nobody Gallery Instagram">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="5" y="5" width="14" height="14" rx="4" stroke-width="1.8" />
            <circle cx="12" cy="12" r="3.4" stroke-width="1.8" />
            <circle cx="16.5" cy="7.5" r="0.9" fill="currentColor" />
          </svg>
        </a>
      </div>
    </footer>
    <script src="../script.js?v=20260517d"></script>
  </body>
</html>
