    <link rel="stylesheet" href="../styles.css" />

  <body>

        <span data-i18n="location">Shanghai</span>

      <nav class="main-nav" aria-label="Main navigation">
        <a class="wordmark" href="../index.html" aria-label="Nobody Gallery home">

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links">

    <footer class="site-footer">

      <p data-i18n="footerLine">nobody is somebody</p>
